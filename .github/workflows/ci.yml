name: npm CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mcp-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            key: win32-x64
            binary: radiochron.exe
          - os: ubuntu-latest
            key: linux-x64
            binary: radiochron
          - os: macos-15-intel
            key: darwin-x64
            binary: radiochron
          - os: macos-15
            key: darwin-arm64
            binary: radiochron
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the pinned native MCP revision
        env:
          RADIOCHRON_TARGET_KEY: ${{ matrix.key }}
          RADIOCHRON_BINARY_NAME: ${{ matrix.binary }}
          RADIOCHRON_OUTPUT_DIR: ${{ runner.temp }}/radiochron-binary
        run: node scripts/build-pinned.js
      - uses: actions/upload-artifact@v4
        with:
          name: pinned-${{ matrix.key }}
          path: ${{ runner.temp }}/radiochron-binary/*

  package:
    needs: mcp-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/download-artifact@v4
        with:
          pattern: pinned-*
          path: ${{ runner.temp }}/radiochron-binaries
      - run: node --check bin.js
      - run: node --check prepare.js
      - run: node --check scripts/build-pinned.js
      - run: npm test
      - name: Verify package contents and native launcher
        env:
          RADIOCHRON_MCP_BINARY_WIN32_X64: ${{ runner.temp }}/radiochron-binaries/pinned-win32-x64/radiochron.exe
          RADIOCHRON_MCP_BINARY_LINUX_X64: ${{ runner.temp }}/radiochron-binaries/pinned-linux-x64/radiochron
          RADIOCHRON_MCP_BINARY_DARWIN_X64: ${{ runner.temp }}/radiochron-binaries/pinned-darwin-x64/radiochron
          RADIOCHRON_MCP_BINARY_DARWIN_ARM64: ${{ runner.temp }}/radiochron-binaries/pinned-darwin-arm64/radiochron
        run: |
          npm pack --dry-run
          node bin.js --version
