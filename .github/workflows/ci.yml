name: npm CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  native-adapters:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            key: win32-x64
            binary: radiochron-node-bridge.exe
          - os: ubuntu-latest
            key: linux-x64
            binary: radiochron-node-bridge
          - os: ubuntu-24.04-arm
            key: linux-arm64
            binary: radiochron-node-bridge
          - os: macos-15-intel
            key: darwin-x64
            binary: radiochron-node-bridge
          - os: macos-15
            key: darwin-arm64
            binary: radiochron-node-bridge
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the pinned RadioChron Node adapter
        env:
          RADIOCHRON_CORE_OUTPUT_DIR: ${{ runner.temp }}/radiochron-native
        run: node scripts/build-core.js
      - uses: actions/upload-artifact@v6
        with:
          name: native-${{ matrix.key }}
          path: ${{ runner.temp }}/radiochron-native/*

  package:
    needs: native-adapters
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/download-artifact@v7
        with:
          pattern: native-*
          path: ${{ runner.temp }}/radiochron-native
      - run: node --check prepare.js
      - run: node --check core.js
      - run: node --check scripts/build-core.js
      - run: npm test
      - name: Verify npm package contents
        env:
          RADIOCHRON_CORE_BINARY_WIN32_X64: ${{ runner.temp }}/radiochron-native/native-win32-x64/radiochron-node-bridge.exe
          RADIOCHRON_CORE_BINARY_LINUX_X64: ${{ runner.temp }}/radiochron-native/native-linux-x64/radiochron-node-bridge
          RADIOCHRON_CORE_BINARY_LINUX_ARM64: ${{ runner.temp }}/radiochron-native/native-linux-arm64/radiochron-node-bridge
          RADIOCHRON_CORE_BINARY_DARWIN_X64: ${{ runner.temp }}/radiochron-native/native-darwin-x64/radiochron-node-bridge
          RADIOCHRON_CORE_BINARY_DARWIN_ARM64: ${{ runner.temp }}/radiochron-native/native-darwin-arm64/radiochron-node-bridge
        run: npm pack --dry-run
      - name: Reject build artifacts and verify every native target
        run: npm run verify:package

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native-adapters, package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v7
        with:
          pattern: native-*
          path: ${{ runner.temp }}/radiochron-native
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const expected = 'v' + require('./package.json').version; if (process.env.RELEASE_TAG !== expected) { throw new Error('tag ' + process.env.RELEASE_TAG + ' must equal ' + expected); }"
      - name: Publish trusted npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RADIOCHRON_CORE_BINARY_WIN32_X64: ${{ runner.temp }}/radiochron-native/native-win32-x64/radiochron-node-bridge.exe
          RADIOCHRON_CORE_BINARY_LINUX_X64: ${{ runner.temp }}/radiochron-native/native-linux-x64/radiochron-node-bridge
          RADIOCHRON_CORE_BINARY_LINUX_ARM64: ${{ runner.temp }}/radiochron-native/native-linux-arm64/radiochron-node-bridge
          RADIOCHRON_CORE_BINARY_DARWIN_X64: ${{ runner.temp }}/radiochron-native/native-darwin-x64/radiochron-node-bridge
          RADIOCHRON_CORE_BINARY_DARWIN_ARM64: ${{ runner.temp }}/radiochron-native/native-darwin-arm64/radiochron-node-bridge
        run: npm publish --access public
